name: ✈️ Buscar Vuelos Diarios

# Ejecuta 2 veces al día: 08:00 y 16:00 (UTC-3 Argentina)
on:
  schedule:
    # 08:00 UTC (05:00 Argentina -3)
    - cron: '0 8 * * *'
    # 16:00 UTC (13:00 Argentina -3)
    - cron: '0 16 * * *'

  # Permite ejecución manual
  workflow_dispatch:

jobs:
  search-flights:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📝 Instalar dependencias
        run: npm install --verbose

      - name: 🔍 Ejecutar búsqueda de vuelos
        run: npm run search
        timeout-minutes: 10

      - name: 📤 Commit y push resultados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "🛫 Actualizados precios - $(date +'%Y-%m-%d %H:%M:%S UTC')"
          git push

      - name: 💬 Resultado de búsqueda
        if: always()
        run: |
          echo "✅ Búsqueda de vuelos completada"
          echo "📊 Ver resultados en: data/reports/"
          echo "💰 Mejores precios en: data/best-prices.json"


